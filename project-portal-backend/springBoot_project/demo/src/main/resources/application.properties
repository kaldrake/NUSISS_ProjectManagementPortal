server.port=8082
spring.application.name=project-service

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/project_db
spring.datasource.username=project_user
spring.datasource.password=project_password_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Disable Spring Batch schema auto-creation
spring.batch.jdbc.initialize-schema=never

# Scan Service URL
scan.service.url=http://project-portal-alb-621860595.ap-southeast-2.elb.amazonaws.com
scan.service.connect-timeout=5000
scan.service.read-timeout=30000

# JWT (must match login-service secret)
jwt.secret=bXlTZWNyZXRLZXlUaGF0U2hvdWxkQmVDaGFuZ2VkSW5Qcm9kdWN0aW9u
jwt.expiration=86400000
