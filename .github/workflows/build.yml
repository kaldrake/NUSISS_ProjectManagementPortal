name: Combined Security Scans (Separate Frontend/Backend)

on:
  push:
    branches: [main, feature-projectScan]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: nusiss_projectmanagementportal

jobs:
  # =============================================
  # BACKEND SNYK SCANS (3 Microservices)
  # =============================================
  backend-snyk:
    name: Backend Snyk Scans
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: login
            path: project-portal-backend/springBoot_login/demo
            dockerfile: project-portal-backend/springBoot_login/demo/Dockerfile
            image: login-service
          - name: project
            path: project-portal-backend/springBoot_project/demo
            dockerfile: project-portal-backend/springBoot_project/demo/Dockerfile
            image: project-service
          - name: scan
            path: project-portal-backend/springBoot_scan/demo
            dockerfile: project-portal-backend/springBoot_scan/demo/Dockerfile
            image: scan-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles(format('{0}/pom.xml', matrix.service.path)) }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install Snyk globally
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ env.SNYK_TOKEN }}

      - name: Resolve & Test Dependencies (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          mvn dependency:resolve
          snyk test --file=pom.xml --severity-threshold=high --fail-on=upgradable -d
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Snyk monitor (${{ matrix.service.name }})
        if: github.event_name == 'push'
        working-directory: ${{ matrix.service.path }}
        run: snyk monitor --file=pom.xml --project-name=${{ github.repository }}-${{ matrix.service.name }}
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

  # =============================================
  # FRONTEND SNYK SCAN
  # =============================================
  frontend-snyk:
    name: Frontend Snyk Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: project-portal-frontend/package-lock.json

      - name: Install dependencies
        working-directory: project-portal-frontend
        run: npm ci

      - name: Install Snyk globally
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ env.SNYK_TOKEN }}

      - name: Snyk test (Frontend)
        working-directory: project-portal-frontend
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          snyk test --severity-threshold=high --fail-on=upgradable -d
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Snyk monitor (Frontend)
        if: github.event_name == 'push'
        working-directory: project-portal-frontend
        run: snyk monitor --project-name=${{ github.repository }}-frontend
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

  # =============================================
  # DOCKER BUILD & PUSH TO ECR
  # =============================================
  docker-build-push:
    name: Build Docker Images & Push to ECR
    runs-on: ubuntu-latest
    needs: [backend-snyk, frontend-snyk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =============================================
      # Configure AWS Credentials
      # =============================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # =============================================
      # Login to Amazon ECR
      # =============================================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =============================================
      # Build and Push Backend Images
      # =============================================
      
      # Login Service
      - name: Build, tag, and push login-service
        working-directory: project-portal-backend/springBoot_login/demo
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:login-latest .
          docker tag ${{ env.ECR_REPOSITORY }}:login-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:login-latest
          docker tag ${{ env.ECR_REPOSITORY }}:login-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:login-${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:login-latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:login-${{ github.sha }}
      
      # Project Service
      - name: Build, tag, and push project-service
        working-directory: project-portal-backend/springBoot_project/demo
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:project-latest .
          docker tag ${{ env.ECR_REPOSITORY }}:project-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:project-latest
          docker tag ${{ env.ECR_REPOSITORY }}:project-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:project-${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:project-latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:project-${{ github.sha }}
      
      # Scan Service
      - name: Build, tag, and push scan-service
        working-directory: project-portal-backend/springBoot_scan/demo
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:scan-latest .
          docker tag ${{ env.ECR_REPOSITORY }}:scan-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-latest
          docker tag ${{ env.ECR_REPOSITORY }}:scan-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-${{ github.sha }}

      # =============================================
      # Build and Push Frontend Image
      # =============================================
      - name: Build, tag, and push frontend
        working-directory: project-portal-frontend
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:frontend-latest .
          docker tag ${{ env.ECR_REPOSITORY }}:frontend-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:frontend-latest
          docker tag ${{ env.ECR_REPOSITORY }}:frontend-latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:frontend-${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:frontend-latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:frontend-${{ github.sha }}

      # =============================================
      # Output Image URIs
      # =============================================
      - name: Output image URIs
        run: |
          echo "Login Service: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:login-${{ github.sha }}"
          echo "Project Service: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:project-${{ github.sha }}"
          echo "Scan Service: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-${{ github.sha }}"
          echo "Frontend: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:frontend-${{ github.sha }}"

  # =============================================
  # DEPLOY TO ECS (Optional)
  # =============================================
  deploy-ecs:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition project-portal-task --query taskDefinition > task-definition.json

      - name: Update image in task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: login-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:login-${{ github.sha }}
      
      - name: Update project service image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: project-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:project-${{ github.sha }}

      - name: Update scan service image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: scan-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-${{ github.sha }}

      - name: Update frontend image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: frontend-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:frontend-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: task-definition.json
          service: project-portal-service
          cluster: project-portal-cluster
          wait-for-service-stability: true