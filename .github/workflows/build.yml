name: Combined Security Scans (Separate Frontend/Backend)

on:
  push:
    branches: [main, feature-projectScan]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  # schedule:
  #   - cron: '0 0 * * 1'

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  # =============================================
  # BACKEND SNYK SCANS (3 Microservices)
  # =============================================
  backend-snyk:
    name: Backend Snyk Scans
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: login
            path: project-portal-backend/springBoot_login/demo
          # - name: project
          #   path: project-portal-backend/springBoot_project/demo
          # - name: scan
          #   path: project-portal-backend/springBoot_scan/demo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles(format('{0}/pom.xml', matrix.service.path)) }}
          restore-keys: ${{ runner.os }}-m2

      - name: Debug environment (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          mvn --version
          npx snyk --version || echo "Snyk not yet installed"

      - name: Install Snyk globally
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ env.SNYK_TOKEN }}
      
      - name: Check Snyk Auth (debug)
        run: snyk whoami
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Resolve & Test Dependencies (${{ matrix.service.name }})
        timeout-minutes: 20
        working-directory: ${{ matrix.service.path }}
        run: |
          # Increase Node.js memory limit
          export NODE_OPTIONS="--max-old-space-size=8192"
          
          # Resolve Maven dependencies
          mvn dependency:resolve
          
          # Run Snyk test
          snyk test --file=pom.xml --severity-threshold=high --fail-on=upgradable --print-dep -d
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Snyk monitor (${{ matrix.service.name }})
        if: github.event_name == 'push'
        working-directory: ${{ matrix.service.path }}
        run: snyk monitor --file=pom.xml --project-name=${{ github.repository }}-${{ matrix.service.name }}
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

  # =============================================
  # FRONTEND SNYK SCAN
  # =============================================
  frontend-snyk:
    name: Frontend Snyk Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: project-portal-frontend/package-lock.json

      - name: Debug frontend environment
        working-directory: project-portal-frontend
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          node --version
          npm --version

      - name: Install dependencies
        working-directory: project-portal-frontend
        run: npm ci

      - name: Install Snyk globally
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ env.SNYK_TOKEN }}

      - name: Snyk test (Frontend)
        working-directory: project-portal-frontend
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          snyk test --severity-threshold=high --fail-on=upgradable -d
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Snyk monitor (Frontend)
        if: github.event_name == 'push'
        working-directory: project-portal-frontend
        run: snyk monitor --project-name=${{ github.repository }}-frontend
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

  # =============================================
  # CONSOLIDATED DEPENDENCY SCAN (Runs after all scans, doesn't fail the workflow)
  # =============================================
  dependency-scan:
    name: Consolidated Dependency Scan
    runs-on: ubuntu-latest
    needs: [backend-snyk, frontend-snyk]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Install Snyk globally
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Scan Login Service Dependencies
        working-directory: project-portal-backend/springBoot_login/demo
        run: snyk test --file=pom.xml --severity-threshold=high --debug || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Scan Project Service Dependencies
        working-directory: project-portal-backend/springBoot_project/demo
        run: snyk test --file=pom.xml --severity-threshold=high --debug || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Scan Scan Service Dependencies
        working-directory: project-portal-backend/springBoot_scan/demo
        run: snyk test --file=pom.xml --severity-threshold=high --debug || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Scan Frontend Dependencies
        working-directory: project-portal-frontend
        run: snyk test --severity-threshold=high --debug || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
