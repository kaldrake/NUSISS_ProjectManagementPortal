# =============================================
# FIX MAVEN WRAPPER PERMISSIONS
# =============================================

- name: Grant execute permission for Maven wrappers
  run: |
    chmod +x springBoot_login/mvnw
    chmod +x springBoot_project/mvnw
    chmod +x springBoot_scan/mvnw

# =============================================
# PRE-RESOLVE MAVEN DEPENDENCIES
# =============================================

- name: Resolve Dependencies (Login Microservice)
  working-directory: springBoot_login
  run: ./mvnw dependency:resolve

- name: Resolve Dependencies (Project Microservice)
  working-directory: springBoot_project
  run: ./mvnw dependency:resolve

- name: Resolve Dependencies (Scan Microservice)
  working-directory: springBoot_scan
  run: ./mvnw dependency:resolve

# =============================================
# BACKEND SNYK SCANS
# =============================================

- name: Scan Backend Dependencies (Login Microservice)
  working-directory: springBoot_login
  run: snyk test --file=pom.xml --severity-threshold=high -d
  env:
    SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

- name: Scan Backend Dependencies (Project Microservice)
  working-directory: springBoot_project
  run: snyk test --file=pom.xml --severity-threshold=high -d
  env:
    SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

- name: Scan Backend Dependencies (Scan Microservice)
  working-directory: springBoot_scan
  run: snyk test --file=pom.xml --severity-threshold=high -d
  env:
    SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}