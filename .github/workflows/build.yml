name: Combined Security Scans (Separate Frontend/Backend)

on:
  push:
    branches: [main, feature-projectScan]

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

  schedule:
    - cron: '0 0 * * 1'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Snyk CLI
        run: npm install -g snyk

      # =============================================
      # BACKEND SCANS
      # =============================================

      - name: Scan Backend Dependencies (Login Microservice)
        working-directory: project-portal-backend/springBoot_login
        run: snyk test --file=pom.xml --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Scan Backend Dependencies (Project Microservice)
        working-directory: project-portal-backend/springBoot_project
        run: snyk test --file=pom.xml --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Scan Backend Dependencies (Scan Microservice)
        working-directory: project-portal-backend/springBoot_scan
        run: snyk test --file=pom.xml --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # =============================================
      # FRONTEND SCAN
      # =============================================

      - name: Scan Frontend Dependencies
        working-directory: project-portal-frontend
        run: snyk test --file=package-lock.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}